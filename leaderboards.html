
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Leaderboards</title>

<style>
  :root{
    --teal:#00d4c6;
    --glass:rgba(255,255,255,0.07);
    --stroke:rgba(255,255,255,0.12);
    --good:#00d084;
    --bad:#ff4d4d;
  }

  body{
    margin:0;
    font-family:Arial;
    color:white;
    background:
      linear-gradient(rgba(11,31,42,.90),rgba(11,31,42,.95)),
      url("https://images.unsplash.com/photo-1484387436194-cf7cb70800ce?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=1080");
    background-size:cover;
    background-attachment:fixed;
  }

  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    padding:18px 20px 8px;
  }
  .topbar h1{ margin:0; font-size:22px; }
  .topbar a{
    color:var(--teal);
    text-decoration:none;
    font-size:12px;
    opacity:.9;
  }

  .controls{
    display:grid;
    grid-template-columns: 1fr;
    gap:10px;
    padding:0 20px 12px;
    max-width:980px;
  }
  select{
    width:100%;
    padding:12px 12px;
    border-radius:12px;
    border:1px solid rgba(0,212,198,0.20);
    background:rgba(0,0,0,0.28);
    color:white;
    backdrop-filter: blur(12px);
  }
  select option{ color:#0b1f2a; }

  .panel{
    padding:0 20px 24px;
    max-width:980px;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:12px;
  }

  .card{
    background:var(--glass);
    border:1px solid var(--stroke);
    border-radius:16px;
    padding:16px;
    backdrop-filter: blur(14px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.18);
    animation: rise .45s ease both;
  }
  .card:nth-child(2){ animation-delay: .04s; }
  .card:nth-child(3){ animation-delay: .08s; }
  .card:nth-child(4){ animation-delay: .12s; }
  .card:nth-child(5){ animation-delay: .16s; }
  .card:nth-child(6){ animation-delay: .20s; }
  .card:nth-child(7){ animation-delay: .24s; }
  .card:nth-child(8){ animation-delay: .28s; }
  .card:nth-child(9){ animation-delay: .32s; }

  @keyframes rise{
    from{ opacity:0; transform: translateY(10px); }
    to{ opacity:1; transform: translateY(0); }
  }

  .k{
    font-size:12px;
    opacity:.75;
    display:flex;
    justify-content:space-between;
    gap:10px;
  }
  .v{
    font-size:20px;
    font-weight:900;
    color:var(--teal);
    margin-top:8px;
    line-height:1.2;
  }
  .sub{
    margin-top:8px;
    font-size:12px;
    opacity:.85;
    line-height:1.35;
  }

  .medals{
    margin-top:10px;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .row{
    display:flex;
    justify-content:space-between;
    gap:10px;
    align-items:center;
    padding:8px 10px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.10);
    background: rgba(0,0,0,0.18);
  }
  .left{
    display:flex;
    align-items:center;
    gap:10px;
    min-width:0;
  }
  .name{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .count{
    font-weight:900;
    color:white;
    opacity:.9;
  }
  .badge{
    width:26px;
    height:26px;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    background: rgba(0,212,198,0.18);
    border:1px solid rgba(0,212,198,0.30);
  }

  .pill{
    display:inline-block;
    padding:4px 10px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05);
    font-size:11px;
  }

  .pct{
    font-size:18px;
    font-weight:900;
  }
  .pct.good{ color:var(--good); }
  .pct.bad{ color:var(--bad); }
</style>
</head>

<body>

<div class="topbar">
  <h1>📊 Leaderboards</h1>
  <a href="onawhim_firestore_catches.html">← Back to Dashboard</a>
</div>

<div class="controls">
  <select id="tripFilter"></select>
</div>

<div class="panel">
  <div class="grid" id="cards"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBKLfhyxZTn4t7RlRCRTfb8DgzLlPY2sFc",
    authDomain: "onawhim-85c14.firebaseapp.com",
    projectId: "onawhim-85c14",
    storageBucket: "onawhim-85c14.firebasestorage.app",
    messagingSenderId: "582396606776",
    appId: "1:582396606776:web:2c17b5ef75a96fde7f29cd"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const TRIPS = [
    "All",
    "May ARS Opener","May ARS 02",
    "June.Trip.01","June.Trip.02","June.Trip.03","June.Trip.04",
    "July.Trip.01","July.Trip.02","July.Trip.03","July.Trip.04",
    "August.Trip.01","August.Trip.02","August.Trip.03","August.Trip.04",
    "Alaska (Homer)","Alaska (Seward)","Alaska (Whittier)"
  ];

  const tripSelect = document.getElementById("tripFilter");
  TRIPS.forEach(t=>{
    const o=document.createElement("option");
    o.value=t;
    o.textContent=t;
    tripSelect.appendChild(o);
  });

  const safeNum = (v)=>{
    const n = Number(v);
    return Number.isFinite(n) ? n : null;
  };

  const countBy = (arr, keyFn)=>{
    const m = new Map();
    for(const item of arr){
      const k = keyFn(item);
      if(!k) continue;
      m.set(k, (m.get(k)||0)+1);
    }
    return m;
  };

  const topN = (map, n=3)=>{
    return Array.from(map.entries())
      .sort((a,b)=>b[1]-a[1])
      .slice(0,n);
  };

  function pct(kept, total){
    if(!total) return null;
    return Math.round((kept/total)*100);
  }

  async function loadAllCatches(){
    const snap = await getDocs(collection(db,"catches"));
    return snap.docs.map(d=>d.data());
  }

  function filterByTrip(data, trip){
    if(trip === "All") return data;
    return data.filter(d => d.trip === trip);
  }

  function bestDay(data){
    const m = countBy(data, d=>d.date);
    const top = topN(m,1)[0];
    return top ? { date: top[0], count: top[1] } : null;
  }

  function biggestByLength(data){
    let best=null;
    for(const d of data){
      const len = safeNum(d.length);
      if(len==null) continue;
      if(!best || len>best.len) best={ len, species:d.species||"Unknown", angler:d.angler||"—", trip:d.trip||"—", date:d.date||"—" };
    }
    return best;
  }

  function heaviestByWeight(data){
    let best=null;
    for(const d of data){
      const wt = safeNum(d.weight);
      if(wt==null) continue;
      if(!best || wt>best.wt) best={ wt, species:d.species||"Unknown", angler:d.angler||"—", trip:d.trip||"—", date:d.date||"—" };
    }
    return best;
  }

  function keptReleasedStats(data){
    let kept=0, rel=0;
    for(const d of data){
      const st = (d.keptReleased || d.status || "").toLowerCase();
      if(st === "kept") kept++;
      else if(st === "released") rel++;
    }
    const total = kept+rel;
    return { kept, rel, total, keptPct: pct(kept,total), relPct: pct(rel,total) };
  }

  function uniqueSpecies(data){
    const s = new Set();
    data.forEach(d=> d.species && s.add(d.species));
    return s.size;
  }

  function computeCards(dataAll, selectedTrip){
    const data = filterByTrip(dataAll, selectedTrip);

    // core counts
    const tripCounts = countBy(dataAll, d=>d.trip);
    const bestTripEntry = topN(tripCounts,1)[0];

    const topAnglerMap = countBy(data, d=>d.angler);
    const topAnglerEntry = topN(topAnglerMap,1)[0];

    const speciesCounts = countBy(data, d=>d.species);
    const topSpeciesEntry = topN(speciesCounts,1)[0];

    // diversity
    const speciesByAngler = new Map();
    data.forEach(d=>{
      if(!d.angler || !d.species) return;
      if(!speciesByAngler.has(d.angler)) speciesByAngler.set(d.angler, new Set());
      speciesByAngler.get(d.angler).add(d.species);
    });
    let bestDiversity = null;
    for(const [angler,set] of speciesByAngler.entries()){
      if(!bestDiversity || set.size > bestDiversity.count){
        bestDiversity = { angler, count:set.size };
      }
    }

    // biggest/heaviest
    const biggest = biggestByLength(data);
    const heaviest = heaviestByWeight(data);

    // kept/released
    const kr = keptReleasedStats(data);

    // best day
    const bd = bestDay(data);

    // top 3 lists
    const top3Anglers = topN(topAnglerMap,3);
    const top3Species = topN(speciesCounts,3);

    // Build cards (with animation + medal lists)
    const cards = [];

    cards.push({
      title:"Biggest Fish (Length)",
      value: biggest ? `${biggest.species} — ${biggest.len} in` : "—",
      sub: biggest ? `${biggest.angler} · ${biggest.trip} · ${biggest.date}` : "No length data yet."
    });

    cards.push({
      title:"Heaviest Fish (Weight)",
      value: heaviest ? `${heaviest.species} — ${heaviest.wt} lb` : "—",
      sub: heaviest ? `${heaviest.angler} · ${heaviest.trip} · ${heaviest.date}` : "No weight data yet."
    });

    cards.push({
      title:"Most Caught Species",
      value: topSpeciesEntry ? `${topSpeciesEntry[0]} — ${topSpeciesEntry[1]}` : "—",
      sub: "Based on total catch log entries (filtered)."
    });

    cards.push({
      title:"Top Angler (Most Fish)",
      value: topAnglerEntry ? `${topAnglerEntry[0]} — ${topAnglerEntry[1]}` : "—",
      sub: "Based on total catch log entries (filtered)."
    });

    cards.push({
      title:"% Kept vs Released",
      value: (kr.total ? `<span class="pct good">${kr.keptPct}%</span> Kept · <span class="pct bad">${kr.relPct}%</span> Released` : "—"),
      sub: kr.total ? `${kr.kept} kept · ${kr.rel} released (${kr.total} total)` : "No kept/released status yet."
    });

    cards.push({
      title:"Best Day",
      value: bd ? `${bd.date} — ${bd.count}` : "—",
      sub: "Most catches logged on a single date (filtered)."
    });

    cards.push({
      title:"Best Trip (Most Catches)",
      value: bestTripEntry ? `${bestTripEntry[0]} — ${bestTripEntry[1]}` : "—",
      sub: "Computed across ALL trips."
    });

    cards.push({
      title:"Angler — Most Unique Species",
      value: bestDiversity ? `${bestDiversity.angler} — ${bestDiversity.count}` : "—",
      sub: "Species variety (filtered)."
    });

    cards.push({
      title:"Top 3 Anglers",
      value: `${selectedTrip === "All" ? "All Trips" : selectedTrip}`,
      sub: medalList(top3Anglers, "angler")
    });

    cards.push({
      title:"Top 3 Species",
      value: `${selectedTrip === "All" ? "All Trips" : selectedTrip}`,
      sub: medalList(top3Species, "species")
    });

    cards.push({
      title:"Unique Species Count",
      value: `${uniqueSpecies(data)}`,
      sub: "Total different species logged (filtered)."
    });

    return cards;
  }

  function medalList(entries, kind){
    const medals = ["🥇","🥈","🥉"];
    if(!entries.length) return "No data yet.";
    return `
      <div class="medals">
        ${entries.map((e,i)=>`
          <div class="row">
            <div class="left">
              <div class="badge">${medals[i] || "🏅"}</div>
              <div class="name">${escapeHtml(e[0])}</div>
            </div>
            <div class="count">${e[1]}</div>
          </div>
        `).join("")}
      </div>
    `;
  }

  function escapeHtml(s){
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;");
  }

  function render(cards){
    const el = document.getElementById("cards");
    el.innerHTML = cards.map(c=>`
      <div class="card">
        <div class="k">
          <span>${c.title}</span>
          <span class="pill">Live</span>
        </div>
        <div class="v">${c.value}</div>
        <div class="sub">${c.sub}</div>
      </div>
    `).join("");
  }

  let ALL = [];
  async function update(){
    const selected = tripSelect.value;
    const cards = computeCards(ALL, selected);
    render(cards);
  }

  // Load once, then filter locally
  (async function init(){
    try{
      ALL = await loadAllCatches();
      await update();
      tripSelect.addEventListener("change", update);
    }catch(e){
      document.getElementById("cards").innerHTML = `
        <div class="card">
          <div class="k"><span>Leaderboards</span></div>
          <div class="v">Could not load</div>
          <div class="sub">Make sure you're serving this page from http://localhost and your Firestore rules allow reads on /catches.</div>
        </div>
      `;
      console.error(e);
    }
  })();
</script>

</body>
</html>
