
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Leaderboards</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  background:
  linear-gradient(rgba(11,31,42,.9),rgba(11,31,42,.95)),
  url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
  background-size:cover;
}

.header{
  padding:20px;
  font-size:24px;
  font-weight:800;
}

.panel{
  margin:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
}

.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:12px;
  padding:16px;
}

.title{
  font-size:14px;
  opacity:.7;
}

.value{
  font-size:22px;
  color:#00d4c6;
  margin-top:6px;
  font-weight:800;
}

select{
  width:100%;
  padding:10px;
  margin:0 20px 10px 20px;
  border-radius:10px;
}

</style>
</head>

<body>

<div class="header">📊 Leaderboards</div>

<select id="tripFilter"></select>

<div class="panel">
  <div class="grid" id="cards"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBKLfhyxZTn4t7RlRCRTfb8DgzLlPY2sFc",
  authDomain: "onawhim-85c14.firebaseapp.com",
  projectId: "onawhim-85c14",
  storageBucket: "onawhim-85c14.firebasestorage.app",
  messagingSenderId: "582396606776",
  appId: "1:582396606776:web:2c17b5ef75a96fde7f29cd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const trips = [
  "All",
  "May ARS Opener","May ARS 02",
  "June.Trip.01","June.Trip.02","June.Trip.03","June.Trip.04",
  "July.Trip.01","July.Trip.02","July.Trip.03","July.Trip.04",
  "August.Trip.01","August.Trip.02","August.Trip.03","August.Trip.04",
  "Alaska (Homer)","Alaska (Seward)","Alaska (Whittier)"
];

const tripSelect = document.getElementById("tripFilter");

trips.forEach(t=>{
  const o=document.createElement("option");
  o.value=t;
  o.innerText=t;
  tripSelect.appendChild(o);
});

async function loadData(){

  const snap = await getDocs(collection(db,"catches"));
  return snap.docs.map(d=>d.data());
}

function computeStats(data){

  if(!data.length){
    return [
      ["Biggest Fish","-"],
      ["Best Trip","-"],
      ["Top Angler","-"],
      ["Unique Species","0"]
    ];
  }

  // biggest fish
  let biggest = data.reduce((a,b)=>(+b.length > +a.length ? b:a),data[0]);

  // best trip
  const tripCounts = {};
  data.forEach(d=>{
    tripCounts[d.trip]=(tripCounts[d.trip]||0)+1;
  });

  const bestTrip = Object.entries(tripCounts)
    .sort((a,b)=>b[1]-a[1])[0];

  // top angler species variety
  const speciesByAngler = {};
  data.forEach(d=>{
    if(!speciesByAngler[d.angler]){
      speciesByAngler[d.angler]=new Set();
    }
    speciesByAngler[d.angler].add(d.species);
  });

  let topAngler="";
  let max=0;
  Object.entries(speciesByAngler).forEach(([k,v])=>{
    if(v.size>max){
      max=v.size;
      topAngler=k;
    }
  });

  const speciesSet=new Set(data.map(d=>d.species));

  return [
    ["Biggest Fish", `${biggest.species} (${biggest.length} in)`],
    ["Best Trip", `${bestTrip[0]} (${bestTrip[1]})`],
    ["Top Angler", `${topAngler} (${max} species)`],
    ["Unique Species", speciesSet.size]
  ];
}

function render(stats){
  const el = document.getElementById("cards");
  el.innerHTML = stats.map(s=>`
    <div class="card">
      <div class="title">${s[0]}</div>
      <div class="value">${s[1]}</div>
    </div>
  `).join("");
}

async function update(){
  let data = await loadData();
  const selected = tripSelect.value;

  if(selected!=="All"){
    data = data.filter(d=>d.trip===selected);
  }

  render(computeStats(data));
}

tripSelect.addEventListener("change",update);

update();

</script>

</body>
</html>
